<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>permit0 :: pack editor</title>
<style>
/* ============================================================
   permit0 — pack editor
   Enterprise console: neutral dark, sans-serif, blue accent.
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --void:           #050507;
  --bg:             #0a0a0b;
  --surface:        #111113;
  --surface-alt:    #16161a;
  --surface-hover:  #1a1a1f;
  --surface-active: #1f1f24;
  --border:         #232328;
  --border-bright:  #36363d;
  --text:           #fafafa;
  --text-muted:     #a1a1aa;
  --text-dim:       #71717a;
  --text-faint:     #52525b;

  --accent:        #3b82f6;
  --accent-hover:  #2563eb;
  --accent-dim:    rgba(59,130,246,0.12);
  --accent-soft:   rgba(59,130,246,0.18);
  --success:       #10b981;
  --success-dim:   rgba(16,185,129,0.12);
  --warning:       #f59e0b;
  --warning-dim:   rgba(245,158,11,0.12);
  --danger:        #ef4444;
  --danger-dim:    rgba(239,68,68,0.12);
  --info:          #06b6d4;
  --info-dim:      rgba(6,182,212,0.12);

  --phosphor:      var(--success);
  --phosphor-dim:  var(--success-dim);
  --amber:         var(--warning);
  --magenta:       var(--danger);
  --cyan:          var(--info);

  --font-sans:    ui-sans-serif,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-mono:    ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code","Roboto Mono",Menlo,Monaco,Consolas,monospace;
  --font-display: var(--font-sans);

  --radius-sm: 3px;
  --radius:    4px;
  --radius-lg: 6px;
  --shadow:    0 1px 0 rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
}

html,body{
  height:100%;
  font-family:var(--font-sans);
  font-size:13px;line-height:1.5;
  background:var(--bg);color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

::selection{background:var(--accent-soft);color:var(--text)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border:2px solid var(--bg);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

.mono{font-family:var(--font-mono);font-size:12px}
.hidden{display:none !important}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{display:flex;flex-direction:column;height:100vh;background:var(--bg)}

/* ============================================================
   TOPBAR
   ============================================================ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:48px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.topbar-title{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--text);
}
.logo{
  width:26px;height:26px;border-radius:var(--radius);
  background:var(--accent);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-sans);font-size:14px;font-weight:600;
}
.topbar-status{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text-muted);
}

.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--success);display:inline-block;position:relative;
  box-shadow:0 0 0 3px rgba(16,185,129,0.15);
}
.status-dot.error{background:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,0.18)}
.status-dot.loading{background:var(--warning);box-shadow:0 0 0 3px rgba(245,158,11,0.18);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* ============================================================
   THREE-PANEL LAYOUT
   ============================================================ */
.panels{
  flex:1;display:grid;
  grid-template-columns:240px 260px 1fr;
  overflow:hidden;
}
.panel-packs,.panel-files,.panel-editor{
  border-right:1px solid var(--border);
  overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);
}
.panel-editor{border-right:0}

.panel-header{
  padding:10px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.04em;
}
.panel-scroll{flex:1;overflow:auto}

/* ============================================================
   PACK LIST
   ============================================================ */
.pack-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.1s;position:relative;
}
.pack-item:hover{background:var(--surface-hover)}
.pack-item.active{
  background:var(--surface-active);
  box-shadow:inset 2px 0 0 var(--accent);
}
.pack-item-name{
  font-size:13px;font-weight:500;color:var(--text);
}
.pack-item-meta{
  display:flex;gap:10px;margin-top:3px;
  font-size:11px;color:var(--text-dim);
}

/* ============================================================
   FILE LIST
   ============================================================ */
.file-section-header{
  padding:8px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.04em;
  display:flex;justify-content:space-between;align-items:center;
}
.file-section-count{
  background:var(--surface-alt);border:1px solid var(--border);
  color:var(--text-muted);padding:0 6px;border-radius:8px;
  font-size:10px;font-weight:600;
}
.file-item{
  padding:7px 14px 7px 26px;border-bottom:1px solid var(--border);
  cursor:pointer;
  font-family:var(--font-mono);font-size:12px;color:var(--text-muted);
  transition:background 0.1s,color 0.1s;position:relative;
}
.file-item::before{
  content:'';position:absolute;left:14px;top:13px;
  width:4px;height:4px;border-radius:50%;
  background:var(--text-faint);
}
.file-item:hover{background:var(--surface-hover);color:var(--text)}
.file-item:hover::before{background:var(--text-muted)}
.file-item.active{background:var(--surface-active);color:var(--text)}
.file-item.active::before{background:var(--accent)}

.empty-list{
  padding:16px;font-size:12px;
  color:var(--text-dim);text-align:center;
}

/* ============================================================
   EDITOR / WELCOME / INFO
   ============================================================ */
.panel-editor{display:flex;flex-direction:column;background:var(--bg)}

.welcome-screen{padding:80px 40px;text-align:center;color:var(--text-muted)}
.welcome-screen h2{
  font-size:24px;font-weight:600;color:var(--text);
  margin-bottom:12px;letter-spacing:-0.01em;
}
.welcome-screen p{
  font-size:13px;color:var(--text-muted);
  max-width:520px;margin:0 auto;line-height:1.6;
}

.pack-info-screen{padding:32px}
.pack-info-screen h2{
  font-size:22px;font-weight:600;color:var(--text);
  margin-bottom:6px;letter-spacing:-0.01em;
}
.pack-info-screen p{
  font-size:13px;color:var(--text-muted);
}
.info-grid{
  margin-top:18px;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.info-row{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:0}
.info-label{
  padding:10px 14px;background:var(--surface-alt);
  font-size:11px;font-weight:600;color:var(--text-muted);
  border-right:1px solid var(--border);
  text-transform:uppercase;letter-spacing:0.04em;
}
.info-value{
  padding:10px 14px;font-size:13px;color:var(--text);
}

.editor-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.editor-file-name{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:12.5px;color:var(--text);
}
.editor-actions{display:flex;gap:8px}
.unsaved-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--warning);opacity:0;transition:opacity 0.15s;
  box-shadow:0 0 0 3px rgba(245,158,11,0.2);
}
.unsaved-dot.visible{opacity:1}
.editor-body{flex:1;overflow:auto;padding:18px 20px}

.meta-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:16px;overflow:hidden;
}
.meta-title{
  padding:10px 14px;
  background:var(--surface-alt);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.04em;
}
.meta-grid{padding:12px 14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px 24px}
.meta-field{display:flex;gap:12px;align-items:baseline}
.meta-label{
  flex-shrink:0;
  font-size:11px;font-weight:500;color:var(--text-muted);
  min-width:90px;
}
.meta-label::after{content:':';padding-left:2px}
.meta-value{font-size:12.5px;color:var(--text)}
.meta-value.tag{
  display:inline-block;padding:1px 7px;border-radius:8px;
  background:var(--accent-dim);color:var(--accent);
  border:1px solid rgba(59,130,246,0.25);
  font-size:11px;margin-right:4px;
}

.yaml-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.yaml-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;
  background:var(--surface-alt);border-bottom:1px solid var(--border);
}
.yaml-label{
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.04em;
}
.yaml-line-count{font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.yaml-textarea{
  width:100%;min-height:520px;
  background:var(--bg);color:var(--text);border:0;padding:14px;
  font-family:var(--font-mono);font-size:12.5px;line-height:1.65;
  resize:vertical;outline:none;white-space:pre;tab-size:2;
  caret-color:var(--accent);
}
.yaml-textarea:focus{box-shadow:inset 0 0 0 2px var(--accent-dim)}

.error-panel{
  margin-top:14px;padding:10px 14px;border:1px solid;
  border-radius:var(--radius);
  font-family:var(--font-mono);font-size:12px;white-space:pre-wrap;
}
.error-panel.hidden{display:none}
.error-panel.is-error  {background:var(--danger-dim);border-color:rgba(239,68,68,0.4);color:var(--danger)}
.error-panel.is-success{background:var(--success-dim);border-color:rgba(16,185,129,0.4);color:var(--success)}
.error-panel-header{font-weight:600;font-family:var(--font-sans);margin-bottom:4px}
.error-panel-body{color:var(--text)}

/* ============================================================
   BUTTONS / SPINNER
   ============================================================ */
.btn{
  appearance:none;background:var(--surface-alt);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 12px;
  font-family:var(--font-sans);font-size:12.5px;font-weight:500;
  cursor:pointer;transition:all 0.12s;
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
}
.btn:hover{background:var(--surface-hover);border-color:var(--border-bright)}
.btn:active{background:var(--surface-active)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--accent-dim);border-color:var(--accent)}

.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

.btn .shortcut{
  margin-left:4px;padding:1px 5px;border-radius:3px;
  background:rgba(255,255,255,0.08);
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  opacity:0.7;
}

.spinner{
  display:inline-block;width:12px;height:12px;
  border:1.5px solid var(--border-bright);border-top-color:var(--accent);
  border-radius:50%;vertical-align:middle;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================================
   FOOTER
   ============================================================ */
.footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 18px;
  background:var(--surface);border-top:1px solid var(--border);
  font-size:11px;color:var(--text-dim);
  flex-shrink:0;
}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container{
  position:fixed;bottom:20px;right:20px;z-index:10000;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--accent);color:var(--text);
  padding:10px 14px;border-radius:var(--radius);
  font-size:12.5px;
  min-width:240px;max-width:380px;pointer-events:auto;
  box-shadow:var(--shadow-lg);
  animation:toastIn 0.22s ease-out;
}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
.toast.info{border-left-color:var(--info)}
@keyframes toastIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

</style>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-title">
      <span class="logo">P</span>
      <span>permit0 · pack editor</span>
    </div>
    <div class="topbar-status" id="globalStatus">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- Three-panel layout -->
  <div class="panels">
    <!-- Left: Pack list -->
    <aside class="panel-packs">
      <div class="panel-header">Packs</div>
      <div class="panel-scroll" id="packList">
        <div class="empty-list" id="packLoading"><span class="spinner"></span></div>
      </div>
    </aside>

    <!-- Middle: File list -->
    <nav class="panel-files">
      <div class="panel-scroll" id="fileList">
        <div class="empty-list" style="margin-top:40px">Select a pack to view files</div>
      </div>
    </nav>

    <!-- Right: Editor -->
    <main class="panel-editor" id="editorPanel">
      <div class="welcome-screen" id="welcomeScreen">
        <h2>permit0 Pack Editor</h2>
        <p>Select a pack from the left panel to browse normalizers and risk rules. Click a file to open it in the editor.</p>
        <p style="margin-top:14px;font-size:11.5px;color:var(--text-dim)">Shortcuts: Ctrl+S save · Ctrl+Shift+V validate</p>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>permit0 v0.1.0</span>
    <span id="footerInfo"></span>
  </footer>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // --- State ---
  const state = {
    packs: [],
    activePack: null,
    packDetail: null,
    activeFile: null,   // { kind: 'normalizer'|'risk_rule', file: string }
    fileData: null,
    originalYaml: '',
    loading: false,
  };

  // --- DOM refs ---
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
  const packListEl = $('#packList');
  const fileListEl = $('#fileList');
  const editorPanel = $('#editorPanel');
  const welcomeScreen = $('#welcomeScreen');
  const toastContainer = $('#toastContainer');
  const statusDot = $('#statusDot');
  const statusText = $('#statusText');
  const footerInfo = $('#footerInfo');

  // --- API helpers ---
  async function api(method, path, body) {
    setStatus('loading', 'Loading...');
    try {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const resp = await fetch('/api/v1' + path, opts);
      const json = await resp.json();
      setStatus('ok', 'Ready');
      if (!json.ok) throw new Error(json.error || 'Unknown error');
      return json.data;
    } catch (err) {
      setStatus('error', 'Error');
      throw err;
    }
  }

  function setStatus(type, text) {
    statusDot.className = 'status-dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
    statusText.textContent = text;
  }

  // --- Toast ---
  function toast(message, type) {
    type = type || 'info';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = message;
    toastContainer.appendChild(el);
    setTimeout(function() {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(function() { el.remove(); }, 300);
    }, 3500);
  }

  // --- Pack List ---
  async function loadPacks() {
    try {
      state.packs = await api('GET', '/packs');
      renderPacks();
    } catch (err) {
      packListEl.innerHTML = '<div class="empty-list">Failed to load packs</div>';
      toast('Failed to load packs: ' + err.message, 'error');
    }
  }

  function renderPacks() {
    if (!state.packs || state.packs.length === 0) {
      packListEl.innerHTML = '<div class="empty-list">No packs found</div>';
      return;
    }
    packListEl.innerHTML = state.packs.map(function(p) {
      var active = state.activePack === p.name ? ' active' : '';
      return '<div class="pack-item' + active + '" data-pack="' + esc(p.name) + '">'
        + '<div class="pack-item-name">' + esc(p.name) + '</div>'
        + '<div class="pack-item-meta">'
        + '<span>v' + esc(p.version || '?') + '</span>'
        + '<span>' + (p.normalizer_count || 0) + ' norm</span>'
        + '<span>' + (p.risk_rule_count || 0) + ' rules</span>'
        + '</div></div>';
    }).join('');

    $$('.pack-item', packListEl).forEach(function(el) {
      el.addEventListener('click', function() {
        selectPack(el.dataset.pack);
      });
    });
  }

  async function selectPack(name) {
    state.activePack = name;
    state.activeFile = null;
    state.fileData = null;
    renderPacks();
    try {
      state.packDetail = await api('GET', '/packs/' + encodeURIComponent(name));
      renderFiles();
      renderPackInfo();
    } catch (err) {
      fileListEl.innerHTML = '<div class="empty-list">Failed to load pack</div>';
      toast('Failed to load pack: ' + err.message, 'error');
    }
  }

  // --- File List ---
  function renderFiles() {
    var d = state.packDetail;
    if (!d) { fileListEl.innerHTML = ''; return; }

    var norms = d.normalizers || [];
    var rules = d.risk_rules || [];

    var html = '<div class="file-section">'
      + '<div class="file-section-header">Normalizers <span class="file-section-count">' + norms.length + '</span></div>';
    if (norms.length === 0) {
      html += '<div class="empty-list">None</div>';
    } else {
      norms.forEach(function(f) {
        var active = state.activeFile && state.activeFile.kind === 'normalizer' && state.activeFile.file === f ? ' active' : '';
        html += '<div class="file-item' + active + '" data-kind="normalizer" data-file="' + esc(f) + '">' + esc(f) + '</div>';
      });
    }
    html += '</div>';

    html += '<div class="file-section">'
      + '<div class="file-section-header">Risk Rules <span class="file-section-count">' + rules.length + '</span></div>';
    if (rules.length === 0) {
      html += '<div class="empty-list">None</div>';
    } else {
      rules.forEach(function(f) {
        var active = state.activeFile && state.activeFile.kind === 'risk_rule' && state.activeFile.file === f ? ' active' : '';
        html += '<div class="file-item' + active + '" data-kind="risk_rule" data-file="' + esc(f) + '">' + esc(f) + '</div>';
      });
    }
    html += '</div>';

    fileListEl.innerHTML = html;

    $$('.file-item', fileListEl).forEach(function(el) {
      el.addEventListener('click', function() {
        selectFile(el.dataset.kind, el.dataset.file);
      });
    });
  }

  async function selectFile(kind, file) {
    state.activeFile = { kind: kind, file: file };
    renderFiles();
    try {
      var endpoint = kind === 'normalizer' ? 'normalizers' : 'risk_rules';
      state.fileData = await api('GET', '/packs/' + encodeURIComponent(state.activePack) + '/' + endpoint + '/' + encodeURIComponent(file));
      state.originalYaml = state.fileData.yaml || '';
      renderEditor();
      document.title = file + ' - permit0 Pack Editor';
    } catch (err) {
      toast('Failed to load file: ' + err.message, 'error');
    }
  }

  // --- Pack Info (when pack selected but no file) ---
  function renderPackInfo() {
    var d = state.packDetail;
    editorPanel.innerHTML = '';
    var screen = document.createElement('div');
    screen.className = 'pack-info-screen';
    screen.innerHTML = '<h2>' + esc(d.name) + '</h2>'
      + '<div class="info-grid">'
      + infoRow('Version', d.version || 'unknown')
      + infoRow('Vendor', d.vendor || 'unknown')
      + infoRow('Description', d.description || 'No description')
      + infoRow('Normalizers', (d.normalizers || []).length)
      + infoRow('Risk Rules', (d.risk_rules || []).length)
      + '</div>'
      + '<p style="margin-top:24px;font-size:12px">Click a file in the middle panel to open the editor.</p>';
    editorPanel.appendChild(screen);
    document.title = d.name + ' - permit0 Pack Editor';
  }

  function infoRow(label, value) {
    return '<div class="info-row"><span class="info-label">' + esc(label) + '</span><span class="info-value">' + esc(String(value)) + '</span></div>';
  }

  // --- Editor ---
  function renderEditor() {
    var fd = state.fileData;
    var kind = state.activeFile.kind;
    editorPanel.innerHTML = '';

    // Toolbar
    var toolbar = document.createElement('div');
    toolbar.className = 'editor-toolbar';
    toolbar.innerHTML = '<div class="editor-file-name">'
      + '<span class="unsaved-dot" id="unsavedDot"></span>'
      + esc(state.activeFile.file)
      + '</div>'
      + '<div class="editor-actions">'
      + '<button class="btn" id="btnValidate">Validate<span class="shortcut">Ctrl+Shift+V</span></button>'
      + '<button class="btn btn-primary" id="btnSave">Save<span class="shortcut">Ctrl+S</span></button>'
      + '</div>';
    editorPanel.appendChild(toolbar);

    // Editor body wrapper
    var body = document.createElement('div');
    body.className = 'editor-body';

    // Metadata
    var meta = fd.meta || {};
    var metaPanel = document.createElement('div');
    metaPanel.className = 'meta-panel';
    var metaHtml = '<div class="meta-title">Metadata</div><div class="meta-grid">';
    if (kind === 'normalizer') {
      metaHtml += metaField('id', meta.id);
      metaHtml += metaField('action_type', meta.action_type);
      metaHtml += metaField('priority', meta.priority);
      metaHtml += metaField('source', meta.source);
    } else {
      metaHtml += metaField('action_type', meta.action_type);
      metaHtml += metaFieldArray('flags', meta.flags);
      metaHtml += metaFieldArray('amplifiers', meta.amplifiers);
    }
    metaHtml += '</div>';
    metaPanel.innerHTML = metaHtml;
    body.appendChild(metaPanel);

    // YAML area
    var yamlWrap = document.createElement('div');
    yamlWrap.className = 'yaml-wrap';

    var yamlHeader = document.createElement('div');
    yamlHeader.className = 'yaml-header';
    var lineCount = (fd.yaml || '').split('\n').length;
    yamlHeader.innerHTML = '<span class="yaml-label">YAML Source</span><span class="yaml-line-count" id="lineCount">' + lineCount + ' lines</span>';
    yamlWrap.appendChild(yamlHeader);

    var textarea = document.createElement('textarea');
    textarea.className = 'yaml-textarea';
    textarea.id = 'yamlEditor';
    textarea.value = fd.yaml || '';
    textarea.spellcheck = false;
    textarea.setAttribute('autocomplete', 'off');
    textarea.setAttribute('autocorrect', 'off');
    textarea.setAttribute('autocapitalize', 'off');
    yamlWrap.appendChild(textarea);
    body.appendChild(yamlWrap);

    // Error panel
    var errPanel = document.createElement('div');
    errPanel.className = 'error-panel hidden';
    errPanel.id = 'errorPanel';
    errPanel.innerHTML = '<div class="error-panel-header" id="errorHeader"></div>'
      + '<div class="error-panel-body" id="errorBody"></div>';
    body.appendChild(errPanel);

    editorPanel.appendChild(body);

    // --- Wire events ---
    var btnSave = $('#btnSave');
    var btnValidate = $('#btnValidate');

    textarea.addEventListener('input', function() {
      updateUnsaved();
      updateLineCount();
    });

    textarea.addEventListener('keydown', function(e) {
      // Tab support
      if (e.key === 'Tab') {
        e.preventDefault();
        var start = textarea.selectionStart;
        var end = textarea.selectionEnd;
        var val = textarea.value;
        textarea.value = val.substring(0, start) + '  ' + val.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + 2;
        updateUnsaved();
        updateLineCount();
      }
    });

    btnSave.addEventListener('click', doSave);
    btnValidate.addEventListener('click', doValidate);
  }

  function metaField(label, value) {
    if (value === undefined || value === null) value = '-';
    return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span class="meta-value">' + esc(String(value)) + '</span></div>';
  }

  function metaFieldArray(label, arr) {
    if (!arr || !Array.isArray(arr) || arr.length === 0) {
      return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span class="meta-value">-</span></div>';
    }
    var tags = arr.map(function(v) { return '<span class="meta-value tag">' + esc(String(v)) + '</span>'; }).join(' ');
    return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span>' + tags + '</span></div>';
  }

  function updateUnsaved() {
    var dot = $('#unsavedDot');
    var ta = $('#yamlEditor');
    if (dot && ta) {
      var changed = ta.value !== state.originalYaml;
      dot.classList.toggle('visible', changed);
    }
  }

  function updateLineCount() {
    var ta = $('#yamlEditor');
    var lc = $('#lineCount');
    if (ta && lc) {
      lc.textContent = ta.value.split('\n').length + ' lines';
    }
  }

  // --- Save ---
  async function doSave() {
    if (!state.activeFile || !state.activePack) return;
    var ta = $('#yamlEditor');
    if (!ta) return;
    var yaml = ta.value;
    var endpoint = state.activeFile.kind === 'normalizer' ? 'normalizers' : 'risk_rules';
    var btnSave = $('#btnSave');
    btnSave.disabled = true;
    btnSave.innerHTML = '<span class="spinner"></span> Saving...';
    try {
      await api('PUT', '/packs/' + encodeURIComponent(state.activePack) + '/' + endpoint + '/' + encodeURIComponent(state.activeFile.file), { yaml: yaml });
      state.originalYaml = yaml;
      updateUnsaved();
      showFeedback('success', 'Saved', 'File saved successfully.');
      toast('File saved successfully', 'success');
    } catch (err) {
      showFeedback('error', 'Save Failed', err.message);
      toast('Save failed: ' + err.message, 'error');
    } finally {
      btnSave.disabled = false;
      btnSave.innerHTML = 'Save<span class="shortcut">Ctrl+S</span>';
    }
  }

  // --- Validate ---
  async function doValidate() {
    if (!state.activeFile) return;
    var ta = $('#yamlEditor');
    if (!ta) return;
    var yaml = ta.value;
    var kind = state.activeFile.kind;
    var btnValidate = $('#btnValidate');
    btnValidate.disabled = true;
    btnValidate.innerHTML = '<span class="spinner"></span> Validating...';
    try {
      var result = await api('POST', '/packs/validate', { kind: kind, yaml: yaml });
      if (result.valid) {
        showFeedback('success', 'Valid', 'YAML is valid. No errors found.');
        toast('Validation passed', 'success');
      } else {
        var errors = (result.errors || []).join('\n');
        showFeedback('error', 'Validation Errors', errors || 'Unknown validation error');
      }
    } catch (err) {
      showFeedback('error', 'Validation Failed', err.message);
    } finally {
      btnValidate.disabled = false;
      btnValidate.innerHTML = 'Validate<span class="shortcut">Ctrl+Shift+V</span>';
    }
  }

  // --- Feedback panel ---
  function showFeedback(type, title, body) {
    var panel = $('#errorPanel');
    var header = $('#errorHeader');
    var bodyEl = $('#errorBody');
    if (!panel) return;
    panel.className = 'error-panel is-' + type;
    var icon = type === 'success' ? '✓' : '✗';
    header.textContent = icon + ' ' + title;
    bodyEl.textContent = body;
  }

  // --- Keyboard shortcuts ---
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      doSave();
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'V' || e.key === 'v')) {
      e.preventDefault();
      doValidate();
    }
  });

  // --- Escape helper ---
  function esc(s) {
    if (s === null || s === undefined) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(s)));
    return div.innerHTML;
  }

  // --- Init ---
  loadPacks();
})();
</script>
</body>
</html>
