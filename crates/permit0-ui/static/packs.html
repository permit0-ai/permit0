<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>permit0 :: pack editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PERMIT0 // PACK EDITOR
   Terminal Brutalism — phosphor on void
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --void:           #050505;
  --bg:             #0a0a0a;
  --surface:        #0e0e0e;
  --surface-alt:    #131313;
  --surface-hover:  #181818;
  --border:         #232323;
  --border-bright:  #3a3a3a;
  --text:           #d8d8d8;
  --text-muted:     #9a9a9a;
  --text-dim:       #5a5a5a;
  --phosphor:       #00ff9c;
  --phosphor-dim:   #008f56;
  --amber:          #ffb000;
  --magenta:        #ff2d6f;
  --cyan:           #5ee0ff;

  --accent:        var(--phosphor);
  --accent-hover:  #00cc7a;
  --accent-dim:    rgba(0,255,156,0.14);
  --success:       var(--phosphor);
  --success-dim:   rgba(0,255,156,0.10);
  --warning:       var(--amber);
  --danger:        var(--magenta);
  --danger-dim:    rgba(255,45,111,0.12);

  --font-mono:    'IBM Plex Mono','Berkeley Mono','JetBrains Mono','Fira Code',monospace;
  --font-sans:    'IBM Plex Mono',monospace;
  --font-display: 'VT323','IBM Plex Mono',monospace;

  --radius:    0;
  --shadow:    0 0 0 1px var(--border);
}

html,body{
  height:100%;
  font-family:var(--font-mono);
  font-size:13px;line-height:1.5;
  background:var(--bg);color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.01em;
}

/* scanlines */
body::before{
  content:'';position:fixed;inset:0;
  pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,
    rgba(255,255,255,0) 0,rgba(255,255,255,0) 2px,
    rgba(255,255,255,0.025) 2px,rgba(255,255,255,0.025) 3px);
  mix-blend-mode:overlay;
}
body::after{
  content:'';position:fixed;inset:0;
  pointer-events:none;z-index:9001;
  background:
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
  background-size:cover,180px;opacity:0.55;
}

::selection{background:var(--phosphor);color:var(--void)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright)}

.mono{font-family:var(--font-mono)}
.hidden{display:none !important}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* ============================================================
   TOPBAR
   ============================================================ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:46px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;
}
.topbar::after{
  content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,var(--phosphor) 18%,var(--phosphor) 82%,transparent);
  opacity:0.35;
}
.topbar-title{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--text);
}
.topbar-title-bracket{color:var(--phosphor);letter-spacing:0;font-size:10px;opacity:0.85}
.logo{
  width:24px;height:24px;background:var(--phosphor);color:var(--void);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:20px;font-weight:400;
  box-shadow:0 0 12px rgba(0,255,156,0.55),inset 0 0 0 1px rgba(0,0,0,0.3);
}
.topbar-status{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);
}

.status-dot{
  width:9px;height:9px;background:var(--phosphor);display:inline-block;position:relative;
  box-shadow:0 0 8px var(--phosphor),0 0 16px rgba(0,255,156,0.4);
}
.status-dot::after{
  content:'';position:absolute;inset:-4px;
  border:1px solid var(--phosphor);opacity:0.3;
}
.status-dot.error{background:var(--magenta);box-shadow:0 0 8px var(--magenta),0 0 16px rgba(255,45,111,0.4)}
.status-dot.error::after{border-color:var(--magenta)}
.status-dot.loading{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 0.9s ease-in-out infinite}
.status-dot.loading::after{border-color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ============================================================
   THREE-PANEL LAYOUT
   ============================================================ */
.panels{
  flex:1;display:grid;
  grid-template-columns:240px 260px 1fr;
  overflow:hidden;
}
.panel-packs,.panel-files,.panel-editor{
  border-right:1px solid var(--border);
  overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);
}
.panel-editor{border-right:0}

.panel-header{
  padding:12px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);
}
.panel-header::before{content:'// ';color:var(--phosphor);opacity:0.6}
.panel-scroll{flex:1;overflow:auto}

/* ============================================================
   PACK LIST
   ============================================================ */
.pack-item{
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.1s;position:relative;
}
.pack-item:hover{background:var(--surface)}
.pack-item.active{
  background:var(--surface);border-left:2px solid var(--phosphor);
  padding-left:14px;
}
.pack-item.active::after{
  content:'▸';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--phosphor);
}
.pack-item-name{
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  color:var(--text);letter-spacing:0.04em;
}
.pack-item-meta{
  display:flex;gap:10px;margin-top:4px;
  font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  letter-spacing:0.05em;
}

/* ============================================================
   FILE LIST
   ============================================================ */
.file-section{}
.file-section-header{
  padding:10px 16px 8px;
  background:var(--surface);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);
  display:flex;justify-content:space-between;align-items:center;
}
.file-section-count{
  background:var(--bg);border:1px solid var(--border-bright);
  color:var(--phosphor);padding:0 6px;font-size:10px;letter-spacing:0;
}
.file-item{
  padding:7px 16px 7px 26px;border-bottom:1px solid var(--border);
  cursor:pointer;
  font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
  transition:background 0.1s,color 0.1s;position:relative;
}
.file-item::before{
  content:'◌';position:absolute;left:12px;color:var(--text-dim);
}
.file-item:hover{background:var(--surface);color:var(--text)}
.file-item:hover::before{color:var(--phosphor)}
.file-item.active{background:var(--surface);color:var(--phosphor)}
.file-item.active::before{content:'●';color:var(--phosphor)}

.empty-list{
  padding:16px;font-family:var(--font-mono);font-size:11px;
  color:var(--text-dim);text-align:center;letter-spacing:0.05em;
}

/* ============================================================
   EDITOR / WELCOME / INFO
   ============================================================ */
.panel-editor{display:flex;flex-direction:column;background:var(--bg)}

.welcome-screen{padding:80px 40px;text-align:center;color:var(--text-muted)}
.welcome-screen h2{
  font-family:var(--font-display);font-size:48px;
  color:var(--phosphor);margin-bottom:16px;
  text-shadow:0 0 18px rgba(0,255,156,0.45);
  letter-spacing:0.04em;
}
.welcome-screen h2::before{content:'> ';opacity:0.6}
.welcome-screen p{
  font-family:var(--font-mono);font-size:12px;color:var(--text-muted);
  max-width:520px;margin:0 auto;line-height:1.7;
}

.pack-info-screen{padding:40px}
.pack-info-screen h2{
  font-family:var(--font-display);font-size:40px;
  color:var(--phosphor);margin-bottom:8px;
  text-shadow:0 0 14px rgba(0,255,156,0.35);
}
.pack-info-screen h2::before{content:'> ';opacity:0.6}
.pack-info-screen p{
  font-family:var(--font-mono);font-size:11px;color:var(--text-dim);
  letter-spacing:0.1em;text-transform:uppercase;
}
.pack-info-screen p::before{content:'// ';color:var(--phosphor);opacity:0.6}
.info-grid{margin-top:20px;border:1px solid var(--border)}
.info-row{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:0}
.info-label{
  padding:10px 16px;background:var(--surface);
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);
  border-right:1px solid var(--border);
}
.info-value{
  padding:10px 16px;
  font-family:var(--font-mono);font-size:12px;color:var(--text);
}

.editor-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.editor-file-name{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:12px;color:var(--text);
  letter-spacing:0.04em;
}
.editor-file-name::before{content:'$ ';color:var(--phosphor);opacity:0.7}
.editor-actions{display:flex;gap:8px}
.unsaved-dot{
  display:inline-block;width:8px;height:8px;background:var(--amber);
  opacity:0;transition:opacity 0.15s;box-shadow:0 0 8px var(--amber);
}
.unsaved-dot.visible{opacity:1}
.editor-body{flex:1;overflow:auto;padding:18px 22px}

.meta-panel{background:var(--surface);border:1px solid var(--border);margin-bottom:18px}
.meta-title{
  padding:10px 14px;
  background:var(--surface-alt);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);
}
.meta-title::before{content:'// ';color:var(--phosphor);opacity:0.6}
.meta-grid{padding:12px 14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px 24px}
.meta-field{display:flex;gap:12px;align-items:baseline}
.meta-label{
  flex-shrink:0;
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);
  min-width:90px;
}
.meta-label::after{content:':';padding-left:2px}
.meta-value{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.meta-value.tag{
  display:inline-block;padding:1px 7px;
  background:var(--accent-dim);color:var(--phosphor);
  border:1px solid var(--phosphor-dim);
  font-size:10px;letter-spacing:0.08em;margin-right:4px;
}

.yaml-wrap{background:var(--void);border:1px solid var(--border)}
.yaml-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;
  background:var(--surface-alt);border-bottom:1px solid var(--border);
}
.yaml-label{
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);
}
.yaml-label::before{content:'$ ';color:var(--phosphor)}
.yaml-line-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:0.05em}
.yaml-textarea{
  width:100%;min-height:520px;
  background:var(--void);color:var(--text);border:0;padding:14px;
  font-family:var(--font-mono);font-size:12px;line-height:1.7;
  resize:vertical;outline:none;white-space:pre;tab-size:2;
  caret-color:var(--phosphor);
}
.yaml-textarea:focus{box-shadow:inset 0 0 0 1px var(--phosphor)}

.error-panel{
  margin-top:14px;padding:10px 14px;border:1px solid;
  font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;
}
.error-panel.hidden{display:none}
.error-panel.is-error  {background:rgba(255,45,111,0.06);border-color:var(--magenta);color:var(--magenta)}
.error-panel.is-success{background:rgba(0,255,156,0.06);border-color:var(--phosphor);color:var(--phosphor)}
.error-panel-header{font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.error-panel-body{color:var(--text)}

/* ============================================================
   BUTTONS / SPINNER
   ============================================================ */
.btn{
  appearance:none;background:var(--surface-alt);color:var(--text);
  border:1px solid var(--border-bright);border-radius:0;
  padding:7px 14px;
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
  transition:all 0.12s;
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
  position:relative;
}
.btn::before{content:'[';opacity:0.55}
.btn::after {content:']';opacity:0.55}
.btn:hover{background:var(--surface-hover);border-color:var(--text-muted);color:var(--text)}
.btn:hover::before,.btn:hover::after{opacity:1;color:var(--phosphor)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.btn-primary{background:transparent;border-color:var(--phosphor);color:var(--phosphor)}
.btn-primary:hover{background:var(--phosphor);color:var(--void);box-shadow:0 0 16px rgba(0,255,156,0.4)}
.btn-primary:hover::before,.btn-primary:hover::after{color:var(--void);opacity:1}

.btn .shortcut{
  margin-left:4px;padding:1px 5px;
  border:1px solid currentColor;font-size:9px;
  letter-spacing:0.05em;opacity:0.6;
}

.spinner{
  display:inline-block;width:9px;height:14px;
  background:var(--phosphor);
  animation:blink 0.8s steps(2,end) infinite;
  vertical-align:middle;
  box-shadow:0 0 6px var(--phosphor);
}
@keyframes blink{50%{opacity:0.15}}

/* ============================================================
   FOOTER
   ============================================================ */
.footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 18px;
  background:var(--surface);border-top:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);
  flex-shrink:0;
}
.footer span:first-child::before{content:'// ';color:var(--phosphor);opacity:0.5}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container{
  position:fixed;bottom:24px;right:24px;z-index:10000;
  display:flex;flex-direction:column;gap:10px;pointer-events:none;
}
.toast{
  background:var(--void);border:1px solid var(--phosphor);color:var(--phosphor);
  padding:10px 14px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.05em;
  min-width:240px;max-width:380px;pointer-events:auto;
  box-shadow:0 0 24px rgba(0,255,156,0.25);
  position:relative;animation:toastIn 0.25s ease-out;
}
.toast::before{content:'>>> ';color:var(--phosphor);font-weight:600}
.toast.success{border-color:var(--phosphor);color:var(--phosphor)}
.toast.success::before{content:'[OK] '}
.toast.error{border-color:var(--magenta);color:var(--magenta);box-shadow:0 0 24px rgba(255,45,111,0.3)}
.toast.error::before{content:'[ERR] '}
.toast.info{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 24px rgba(94,224,255,0.25)}
.toast.info::before{content:'[INFO] '}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

</style>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-title">
      <span class="logo">P</span>
      <span class="topbar-title-bracket">[</span>
      permit0 :: pack editor
      <span class="topbar-title-bracket">]</span>
    </div>
    <div class="topbar-status" id="globalStatus">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- Three-panel layout -->
  <div class="panels">
    <!-- Left: Pack list -->
    <aside class="panel-packs">
      <div class="panel-header">Packs</div>
      <div class="panel-scroll" id="packList">
        <div class="empty-list" id="packLoading"><span class="spinner"></span></div>
      </div>
    </aside>

    <!-- Middle: File list -->
    <nav class="panel-files">
      <div class="panel-scroll" id="fileList">
        <div class="empty-list" style="margin-top:40px">Select a pack to view files</div>
      </div>
    </nav>

    <!-- Right: Editor -->
    <main class="panel-editor" id="editorPanel">
      <div class="welcome-screen" id="welcomeScreen">
        <h2>permit0 Pack Editor</h2>
        <p>Select a pack from the left panel to browse normalizers and risk rules. Click a file to open it in the editor.</p>
        <p style="margin-top:18px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim)">// Ctrl+S save  ·  Ctrl+Shift+V validate</p>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>permit0 v0.1.0</span>
    <span id="footerInfo"></span>
  </footer>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // --- State ---
  const state = {
    packs: [],
    activePack: null,
    packDetail: null,
    activeFile: null,   // { kind: 'normalizer'|'risk_rule', file: string }
    fileData: null,
    originalYaml: '',
    loading: false,
  };

  // --- DOM refs ---
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
  const packListEl = $('#packList');
  const fileListEl = $('#fileList');
  const editorPanel = $('#editorPanel');
  const welcomeScreen = $('#welcomeScreen');
  const toastContainer = $('#toastContainer');
  const statusDot = $('#statusDot');
  const statusText = $('#statusText');
  const footerInfo = $('#footerInfo');

  // --- API helpers ---
  async function api(method, path, body) {
    setStatus('loading', 'Loading...');
    try {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const resp = await fetch('/api/v1' + path, opts);
      const json = await resp.json();
      setStatus('ok', 'Ready');
      if (!json.ok) throw new Error(json.error || 'Unknown error');
      return json.data;
    } catch (err) {
      setStatus('error', 'Error');
      throw err;
    }
  }

  function setStatus(type, text) {
    statusDot.className = 'status-dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
    statusText.textContent = text;
  }

  // --- Toast ---
  function toast(message, type) {
    type = type || 'info';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = message;
    toastContainer.appendChild(el);
    setTimeout(function() {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(function() { el.remove(); }, 300);
    }, 3500);
  }

  // --- Pack List ---
  async function loadPacks() {
    try {
      state.packs = await api('GET', '/packs');
      renderPacks();
    } catch (err) {
      packListEl.innerHTML = '<div class="empty-list">Failed to load packs</div>';
      toast('Failed to load packs: ' + err.message, 'error');
    }
  }

  function renderPacks() {
    if (!state.packs || state.packs.length === 0) {
      packListEl.innerHTML = '<div class="empty-list">No packs found</div>';
      return;
    }
    packListEl.innerHTML = state.packs.map(function(p) {
      var active = state.activePack === p.name ? ' active' : '';
      return '<div class="pack-item' + active + '" data-pack="' + esc(p.name) + '">'
        + '<div class="pack-item-name">' + esc(p.name) + '</div>'
        + '<div class="pack-item-meta">'
        + '<span>v' + esc(p.version || '?') + '</span>'
        + '<span>' + (p.normalizer_count || 0) + ' norm</span>'
        + '<span>' + (p.risk_rule_count || 0) + ' rules</span>'
        + '</div></div>';
    }).join('');

    $$('.pack-item', packListEl).forEach(function(el) {
      el.addEventListener('click', function() {
        selectPack(el.dataset.pack);
      });
    });
  }

  async function selectPack(name) {
    state.activePack = name;
    state.activeFile = null;
    state.fileData = null;
    renderPacks();
    try {
      state.packDetail = await api('GET', '/packs/' + encodeURIComponent(name));
      renderFiles();
      renderPackInfo();
    } catch (err) {
      fileListEl.innerHTML = '<div class="empty-list">Failed to load pack</div>';
      toast('Failed to load pack: ' + err.message, 'error');
    }
  }

  // --- File List ---
  function renderFiles() {
    var d = state.packDetail;
    if (!d) { fileListEl.innerHTML = ''; return; }

    var norms = d.normalizers || [];
    var rules = d.risk_rules || [];

    var html = '<div class="file-section">'
      + '<div class="file-section-header">Normalizers <span class="file-section-count">' + norms.length + '</span></div>';
    if (norms.length === 0) {
      html += '<div class="empty-list">None</div>';
    } else {
      norms.forEach(function(f) {
        var active = state.activeFile && state.activeFile.kind === 'normalizer' && state.activeFile.file === f ? ' active' : '';
        html += '<div class="file-item' + active + '" data-kind="normalizer" data-file="' + esc(f) + '">' + esc(f) + '</div>';
      });
    }
    html += '</div>';

    html += '<div class="file-section">'
      + '<div class="file-section-header">Risk Rules <span class="file-section-count">' + rules.length + '</span></div>';
    if (rules.length === 0) {
      html += '<div class="empty-list">None</div>';
    } else {
      rules.forEach(function(f) {
        var active = state.activeFile && state.activeFile.kind === 'risk_rule' && state.activeFile.file === f ? ' active' : '';
        html += '<div class="file-item' + active + '" data-kind="risk_rule" data-file="' + esc(f) + '">' + esc(f) + '</div>';
      });
    }
    html += '</div>';

    fileListEl.innerHTML = html;

    $$('.file-item', fileListEl).forEach(function(el) {
      el.addEventListener('click', function() {
        selectFile(el.dataset.kind, el.dataset.file);
      });
    });
  }

  async function selectFile(kind, file) {
    state.activeFile = { kind: kind, file: file };
    renderFiles();
    try {
      var endpoint = kind === 'normalizer' ? 'normalizers' : 'risk_rules';
      state.fileData = await api('GET', '/packs/' + encodeURIComponent(state.activePack) + '/' + endpoint + '/' + encodeURIComponent(file));
      state.originalYaml = state.fileData.yaml || '';
      renderEditor();
      document.title = file + ' - permit0 Pack Editor';
    } catch (err) {
      toast('Failed to load file: ' + err.message, 'error');
    }
  }

  // --- Pack Info (when pack selected but no file) ---
  function renderPackInfo() {
    var d = state.packDetail;
    editorPanel.innerHTML = '';
    var screen = document.createElement('div');
    screen.className = 'pack-info-screen';
    screen.innerHTML = '<h2>' + esc(d.name) + '</h2>'
      + '<div class="info-grid">'
      + infoRow('Version', d.version || 'unknown')
      + infoRow('Vendor', d.vendor || 'unknown')
      + infoRow('Description', d.description || 'No description')
      + infoRow('Normalizers', (d.normalizers || []).length)
      + infoRow('Risk Rules', (d.risk_rules || []).length)
      + '</div>'
      + '<p style="margin-top:24px;font-size:12px">Click a file in the middle panel to open the editor.</p>';
    editorPanel.appendChild(screen);
    document.title = d.name + ' - permit0 Pack Editor';
  }

  function infoRow(label, value) {
    return '<div class="info-row"><span class="info-label">' + esc(label) + '</span><span class="info-value">' + esc(String(value)) + '</span></div>';
  }

  // --- Editor ---
  function renderEditor() {
    var fd = state.fileData;
    var kind = state.activeFile.kind;
    editorPanel.innerHTML = '';

    // Toolbar
    var toolbar = document.createElement('div');
    toolbar.className = 'editor-toolbar';
    toolbar.innerHTML = '<div class="editor-file-name">'
      + '<span class="unsaved-dot" id="unsavedDot"></span>'
      + esc(state.activeFile.file)
      + '</div>'
      + '<div class="editor-actions">'
      + '<button class="btn" id="btnValidate">Validate<span class="shortcut">Ctrl+Shift+V</span></button>'
      + '<button class="btn btn-primary" id="btnSave">Save<span class="shortcut">Ctrl+S</span></button>'
      + '</div>';
    editorPanel.appendChild(toolbar);

    // Editor body wrapper
    var body = document.createElement('div');
    body.className = 'editor-body';

    // Metadata
    var meta = fd.meta || {};
    var metaPanel = document.createElement('div');
    metaPanel.className = 'meta-panel';
    var metaHtml = '<div class="meta-title">Metadata</div><div class="meta-grid">';
    if (kind === 'normalizer') {
      metaHtml += metaField('id', meta.id);
      metaHtml += metaField('action_type', meta.action_type);
      metaHtml += metaField('priority', meta.priority);
      metaHtml += metaField('channel', meta.channel);
    } else {
      metaHtml += metaField('action_type', meta.action_type);
      metaHtml += metaFieldArray('flags', meta.flags);
      metaHtml += metaFieldArray('amplifiers', meta.amplifiers);
    }
    metaHtml += '</div>';
    metaPanel.innerHTML = metaHtml;
    body.appendChild(metaPanel);

    // YAML area
    var yamlWrap = document.createElement('div');
    yamlWrap.className = 'yaml-wrap';

    var yamlHeader = document.createElement('div');
    yamlHeader.className = 'yaml-header';
    var lineCount = (fd.yaml || '').split('\n').length;
    yamlHeader.innerHTML = '<span class="yaml-label">YAML Source</span><span class="yaml-line-count" id="lineCount">' + lineCount + ' lines</span>';
    yamlWrap.appendChild(yamlHeader);

    var textarea = document.createElement('textarea');
    textarea.className = 'yaml-textarea';
    textarea.id = 'yamlEditor';
    textarea.value = fd.yaml || '';
    textarea.spellcheck = false;
    textarea.setAttribute('autocomplete', 'off');
    textarea.setAttribute('autocorrect', 'off');
    textarea.setAttribute('autocapitalize', 'off');
    yamlWrap.appendChild(textarea);
    body.appendChild(yamlWrap);

    // Error panel
    var errPanel = document.createElement('div');
    errPanel.className = 'error-panel hidden';
    errPanel.id = 'errorPanel';
    errPanel.innerHTML = '<div class="error-panel-header" id="errorHeader"></div>'
      + '<div class="error-panel-body" id="errorBody"></div>';
    body.appendChild(errPanel);

    editorPanel.appendChild(body);

    // --- Wire events ---
    var btnSave = $('#btnSave');
    var btnValidate = $('#btnValidate');

    textarea.addEventListener('input', function() {
      updateUnsaved();
      updateLineCount();
    });

    textarea.addEventListener('keydown', function(e) {
      // Tab support
      if (e.key === 'Tab') {
        e.preventDefault();
        var start = textarea.selectionStart;
        var end = textarea.selectionEnd;
        var val = textarea.value;
        textarea.value = val.substring(0, start) + '  ' + val.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + 2;
        updateUnsaved();
        updateLineCount();
      }
    });

    btnSave.addEventListener('click', doSave);
    btnValidate.addEventListener('click', doValidate);
  }

  function metaField(label, value) {
    if (value === undefined || value === null) value = '-';
    return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span class="meta-value">' + esc(String(value)) + '</span></div>';
  }

  function metaFieldArray(label, arr) {
    if (!arr || !Array.isArray(arr) || arr.length === 0) {
      return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span class="meta-value">-</span></div>';
    }
    var tags = arr.map(function(v) { return '<span class="meta-value tag">' + esc(String(v)) + '</span>'; }).join(' ');
    return '<div class="meta-field"><span class="meta-label">' + esc(label) + '</span><span>' + tags + '</span></div>';
  }

  function updateUnsaved() {
    var dot = $('#unsavedDot');
    var ta = $('#yamlEditor');
    if (dot && ta) {
      var changed = ta.value !== state.originalYaml;
      dot.classList.toggle('visible', changed);
    }
  }

  function updateLineCount() {
    var ta = $('#yamlEditor');
    var lc = $('#lineCount');
    if (ta && lc) {
      lc.textContent = ta.value.split('\n').length + ' lines';
    }
  }

  // --- Save ---
  async function doSave() {
    if (!state.activeFile || !state.activePack) return;
    var ta = $('#yamlEditor');
    if (!ta) return;
    var yaml = ta.value;
    var endpoint = state.activeFile.kind === 'normalizer' ? 'normalizers' : 'risk_rules';
    var btnSave = $('#btnSave');
    btnSave.disabled = true;
    btnSave.innerHTML = '<span class="spinner"></span> Saving...';
    try {
      await api('PUT', '/packs/' + encodeURIComponent(state.activePack) + '/' + endpoint + '/' + encodeURIComponent(state.activeFile.file), { yaml: yaml });
      state.originalYaml = yaml;
      updateUnsaved();
      showFeedback('success', 'Saved', 'File saved successfully.');
      toast('File saved successfully', 'success');
    } catch (err) {
      showFeedback('error', 'Save Failed', err.message);
      toast('Save failed: ' + err.message, 'error');
    } finally {
      btnSave.disabled = false;
      btnSave.innerHTML = 'Save<span class="shortcut">Ctrl+S</span>';
    }
  }

  // --- Validate ---
  async function doValidate() {
    if (!state.activeFile) return;
    var ta = $('#yamlEditor');
    if (!ta) return;
    var yaml = ta.value;
    var kind = state.activeFile.kind;
    var btnValidate = $('#btnValidate');
    btnValidate.disabled = true;
    btnValidate.innerHTML = '<span class="spinner"></span> Validating...';
    try {
      var result = await api('POST', '/packs/validate', { kind: kind, yaml: yaml });
      if (result.valid) {
        showFeedback('success', 'Valid', 'YAML is valid. No errors found.');
        toast('Validation passed', 'success');
      } else {
        var errors = (result.errors || []).join('\n');
        showFeedback('error', 'Validation Errors', errors || 'Unknown validation error');
      }
    } catch (err) {
      showFeedback('error', 'Validation Failed', err.message);
    } finally {
      btnValidate.disabled = false;
      btnValidate.innerHTML = 'Validate<span class="shortcut">Ctrl+Shift+V</span>';
    }
  }

  // --- Feedback panel ---
  function showFeedback(type, title, body) {
    var panel = $('#errorPanel');
    var header = $('#errorHeader');
    var bodyEl = $('#errorBody');
    if (!panel) return;
    panel.className = 'error-panel is-' + type;
    var icon = type === 'success' ? '✓' : '✗';
    header.textContent = icon + ' ' + title;
    bodyEl.textContent = body;
  }

  // --- Keyboard shortcuts ---
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      doSave();
    }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'V' || e.key === 'v')) {
      e.preventDefault();
      doValidate();
    }
  });

  // --- Escape helper ---
  function esc(s) {
    if (s === null || s === undefined) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(s)));
    return div.innerHTML;
  }

  // --- Init ---
  loadPacks();
})();
</script>
</body>
</html>
