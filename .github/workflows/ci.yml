name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Allow building against Python interpreters newer than pyo3 explicitly
  # supports (macOS runners ship Python 3.14 but pyo3 0.24 only knows up
  # to 3.13). Forces the stable ABI path under cargo check.
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Kept in sync with the advisory ignores in deny.toml.
          # RUSTSEC-2024-0370: proc-macro-error unmaintained (transitive).
          # RUSTSEC-2026-0097: rand ThreadRng + custom-logger soundness;
          # requires the `log` + `thread_rng` features and a custom logger
          # that calls rand inside log output — we do neither.
          # RUSTSEC-2023-0071: rsa Marvin Attack; reaches us only via
          # sqlx-mysql in Cargo.lock. sqlx is built with `postgres` only,
          # so the mysql driver (and rsa) is never compiled.
          ignore: RUSTSEC-2024-0370,RUSTSEC-2026-0097,RUSTSEC-2023-0071
