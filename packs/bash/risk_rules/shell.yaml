permit0_pack: "permit0/bash"
action_type: "process.shell"
base:
  flags:
    EXECUTION: primary
  amplifiers:
    scope: 5
    irreversibility: 6
    boundary: 4
    environment: 3
rules:
  - when:
      command:
        contains_any: ["rm -rf", "rm -r", "rmdir"]
    then:
      - add_flag:
          flag: DESTRUCTION
          role: primary
      - upgrade:
          dim: irreversibility
          delta: 6
      - upgrade:
          dim: scope
          delta: 4

  - when:
      command:
        regex: "\\|.*\\|.*\\|"
    then:
      - upgrade:
          dim: scope
          delta: 3

  - when:
      command:
        contains_any: ["sudo", "su -"]
    then:
      - add_flag:
          flag: PRIVILEGE
          role: primary
      - upgrade:
          dim: scope
          delta: 4
      - upgrade:
          dim: boundary
          delta: 4

  - when:
      command:
        contains_any: ["curl", "wget"]
    then:
      - add_flag:
          flag: OUTBOUND
          role: secondary
      - upgrade:
          dim: boundary
          delta: 3

  - when:
      command:
        contains: "> /dev/"
    then:
      - gate: "dangerous_device_write"

session_rules: []
