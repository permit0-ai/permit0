permit0_pack: "permit0/bash"
action_type: "process.shell"
base:
  flags:
    EXECUTION: primary
  amplifiers:
    scope: 5
    irreversibility: 6
    boundary: 4
    environment: 3
rules:
  # rm -rf / or rm -rf ~ — catastrophic destruction, block immediately
  - when:
      command:
        regex: "rm\\s+-r[f ].*(/\\s*$|/\"\\s*$|~)"
    then:
      - gate: "catastrophic_recursive_delete"

  - when:
      command:
        contains_any: ["rm -rf", "rm -r", "rmdir"]
    then:
      - add_flag:
          flag: DESTRUCTION
          role: primary
      - upgrade:
          dim: irreversibility
          delta: 6
      - upgrade:
          dim: scope
          delta: 4

  - when:
      command:
        regex: "\\|.*\\|.*\\|"
    then:
      - upgrade:
          dim: scope
          delta: 3

  - when:
      command:
        contains_any: ["sudo", "su -"]
    then:
      - add_flag:
          flag: PRIVILEGE
          role: primary
      - upgrade:
          dim: scope
          delta: 4
      - upgrade:
          dim: boundary
          delta: 4

  - when:
      command:
        contains_any: ["curl", "wget"]
    then:
      - add_flag:
          flag: OUTBOUND
          role: secondary
      - upgrade:
          dim: boundary
          delta: 3

  - when:
      command:
        contains: "> /dev/"
    then:
      - gate: "dangerous_device_write"

  # Pipe to shell (remote code execution pattern)
  - when:
      command:
        regex: "(curl|wget).*\\|.*(sh|bash|zsh)"
    then:
      - gate: "remote_code_execution"

  # Credential/secret access via shell
  - when:
      command:
        contains_any: [".env", "credentials", "secret", "private_key", "id_rsa", "id_ed25519"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - upgrade:
          dim: sensitivity
          delta: 8
      - upgrade:
          dim: scope
          delta: 4

  # Git force push / destructive git
  - when:
      command:
        contains_any: ["git push --force", "git push -f", "git reset --hard", "git clean -f"]
    then:
      - add_flag:
          flag: DESTRUCTION
          role: secondary
      - upgrade:
          dim: irreversibility
          delta: 4

session_rules:
  # Rapid shell execution (>5 in session) — reconnaissance or scripting
  - when:
      record_count:
        gt: 5
    then:
      - upgrade:
          dim: scope
          delta: 6
      - upgrade:
          dim: sensitivity
          delta: 4
