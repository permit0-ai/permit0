permit0_pack: "permit0/bash"
action_type: "process.shell"
base:
  flags:
    shell_exec: primary
  amplifiers:
    scope: 3
    reversibility: 5
    blast_radius: 3
rules:
  - when:
      command:
        contains_any: ["rm -rf", "rm -r", "rmdir"]
    then:
      - add_flag:
          flag: destructive_delete
          role: primary
      - upgrade:
          dim: reversibility
          delta: 4
      - upgrade:
          dim: blast_radius
          delta: 3

  - when:
      command:
        regex: "\\|.*\\|.*\\|"
    then:
      - add_flag:
          flag: complex_pipeline
          role: secondary
      - upgrade:
          dim: scope
          delta: 2

  - when:
      command:
        contains_any: ["sudo", "su -"]
    then:
      - add_flag:
          flag: privilege_escalation
          role: primary
      - upgrade:
          dim: scope
          delta: 3

  - when:
      command:
        contains_any: ["curl", "wget"]
    then:
      - add_flag:
          flag: network_access
          role: secondary

  - when:
      command:
        contains: "> /dev/"
    then:
      - gate: "dangerous_device_write"

session_rules: []
