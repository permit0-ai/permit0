permit0_pack: "permit0/gmail"
id: "gmail:send"
priority: 95
match:
  all:
    - tool: gmail_send
normalize:
  action_type: "email.send"
  domain: "email"
  verb: "send"
  channel: "gmail"
  entities:
    to:
      from: "to"
      type: "string"
      required: true
    subject:
      from: "subject"
      type: "string"
    body:
      from: "body"
      type: "string"
    recipient_scope:
      compute: "recipient_scope"
      args:
        - "to"
        - "org_domain"
    domain:
      compute: "extract_domain"
      args:
        - "to"
