permit0_pack: "permit0/gmail"
action_type: "email.send"
base:
  flags:
    OUTBOUND: primary
    MUTATION: secondary
  amplifiers:
    scope: 8
    irreversibility: 12
    sensitivity: 8
    destination: 15
    boundary: 10
rules:
  - when:
      to:
        contains: ","
    then:
      - upgrade:
          dim: scope
          delta: 5

  - when:
      subject:
        contains_any: ["confidential", "private", "secret"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - upgrade:
          dim: sensitivity
          delta: 10

  - when:
      body:
        contains_any: ["password", "api_key", "secret", "credential", "token", "PASSWORD", "API_KEY", "SECRET"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - upgrade:
          dim: sensitivity
          delta: 15
      - upgrade:
          dim: destination
          delta: 12
      - upgrade:
          dim: boundary
          delta: 8

session_rules:
  - when:
      emails_sent_today:
        gt: 50
    then:
      - upgrade:
          dim: scope
          delta: 6
