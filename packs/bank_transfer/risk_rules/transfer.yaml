permit0_pack: "permit0/bank_transfer"
action_type: "payments.transfer"
base:
  flags:
    FINANCIAL: primary
    OUTBOUND: primary
    MUTATION: secondary
  amplifiers:
    amount: 18
    scope: 10
    irreversibility: 14
    destination: 20
    boundary: 10
    sensitivity: 8
rules:
  # Medium transfers: bump into Medium tier for HITL
  - when:
      amount:
        gt: 10000
    then:
      - upgrade:
          dim: amount
          delta: 4
      - upgrade:
          dim: boundary
          delta: 3

  # Large transfers: bump higher but stay below block thresholds
  - when:
      amount:
        gt: 50000
    then:
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - upgrade:
          dim: amount
          delta: 4
      - upgrade:
          dim: irreversibility
          delta: 3

  # Extremely large: hard block
  - when:
      amount:
        gt: 250000
    then:
      - gate: "extremely_high_value_transfer"

session_rules:
  # As daily total accumulates, escalate risk into Medium/HITL tier
  # Fires after 1-2 transfers in the demo (threshold lowered for demo progression)
  - when:
      daily_total:
        gt: 15000
    then:
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - upgrade:
          dim: scope
          delta: 12
      - upgrade:
          dim: amount
          delta: 10
      - upgrade:
          dim: sensitivity
          delta: 10
      - upgrade:
          dim: destination
          delta: 8
