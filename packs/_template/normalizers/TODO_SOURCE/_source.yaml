# Source metadata for the TODO_SOURCE backend.
#
# `tool_pattern` is enforced by `permit0 pack validate`: every YAML
# in this directory must have a `match.tool` matching the pattern.
# This guards against cross-source poisoning (a normalizer in
# normalizers/TODO_SOURCE/ trying to claim a tool from another vendor).
#
# `mcp_server` points at the MCP adapter this source was designed
# against. Reference, not bundling — packs and MCP servers are
# separate concerns.

source: TODO_SOURCE
display_name: "TODO Display Name"
mcp_server: "TODO/path/to/mcp"
auth: oauth_user        # or: api_key, mtls, none
api_docs: "TODO_URL"
tool_pattern: "TODO_SOURCE_*"
maintainers: [TODO_OWNER]
