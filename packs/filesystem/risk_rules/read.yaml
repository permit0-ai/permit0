permit0_pack: "permit0/filesystem"
action_type: "files.read"
base:
  flags:
    MUTATION: secondary
  amplifiers:
    sensitivity: 3
    scope: 3
    destination: 2
rules:
  # Credential / secret file access — escalate to Medium for agent reviewer.
  # Checks both "path" (filesystem tools) and "file_path" (Claude Code Read).
  - when:
      any:
        - path:
            contains_any: ["credentials", "secret", "password", ".env", "private_key", "token"]
        - file_path:
            contains_any: ["credentials", "secret", "password", ".env", "private_key", "token"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - add_flag:
          flag: PRIVILEGE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 28
      - upgrade:
          dim: scope
          delta: 22
      - upgrade:
          dim: destination
          delta: 18
      - upgrade:
          dim: irreversibility
          delta: 14
      - upgrade:
          dim: boundary
          delta: 16

  - when:
      any:
        - path:
            contains_any: ["/etc/shadow", "/etc/passwd"]
        - file_path:
            contains_any: ["/etc/shadow", "/etc/passwd"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - gate: "system_credential_access"

  - when:
      pii:
        exists: true
    then:
      - add_flag:
          flag: EXPOSURE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 8

  # SSH keys
  - when:
      any:
        - path:
            contains: ".ssh/"
        - file_path:
            contains: ".ssh/"
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - upgrade:
          dim: sensitivity
          delta: 20
      - upgrade:
          dim: boundary
          delta: 12

  # Claude Code configuration (reading settings to plan escalation)
  - when:
      any:
        - path:
            contains_any: [".claude/settings", "claude.json"]
        - file_path:
            contains_any: [".claude/settings", "claude.json"]
    then:
      - add_flag:
          flag: GOVERNANCE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 8
      - upgrade:
          dim: scope
          delta: 4

session_rules:
  # Rapid diverse file reads — potential reconnaissance
  - when:
      record_count:
        gt: 10
    then:
      - upgrade:
          dim: scope
          delta: 4
      - upgrade:
          dim: sensitivity
          delta: 3
