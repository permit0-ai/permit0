permit0_pack: "permit0/filesystem"
action_type: "files.read"
base:
  flags:
    MUTATION: secondary
  amplifiers:
    sensitivity: 3
    scope: 3
    destination: 2
rules:
  # Credential / secret file access — escalate to Medium for agent reviewer.
  # Reading credential files is a precursor to exfiltration attacks.
  # The LLM reviewer evaluates whether the read is justified by the task goal.
  - when:
      path:
        contains_any: ["credentials", "secret", "password", ".env", "private_key", "token"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - add_flag:
          flag: PRIVILEGE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 28
      - upgrade:
          dim: scope
          delta: 22
      - upgrade:
          dim: destination
          delta: 18
      - upgrade:
          dim: irreversibility
          delta: 14
      - upgrade:
          dim: boundary
          delta: 16

  - when:
      path:
        contains_any: ["/etc/shadow", "/etc/passwd"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - gate: "system_credential_access"

  - when:
      pii:
        exists: true
    then:
      - add_flag:
          flag: EXPOSURE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 8
