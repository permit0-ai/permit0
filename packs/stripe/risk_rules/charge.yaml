permit0_pack: "permit0/stripe"
action_type: "payments.charge"
base:
  flags:
    FINANCIAL: primary
    OUTBOUND: primary
    MUTATION: secondary
  amplifiers:
    amount: 12
    scope: 8
    irreversibility: 10
    destination: 15
    boundary: 8
rules:
  - when:
      body.amount:
        gt: 5000
    then:
      - upgrade:
          dim: amount
          delta: 6
      - upgrade:
          dim: destination
          delta: 5

  - when:
      body.amount:
        gt: 100000
    then:
      - gate: "extremely_high_value_block"

  - when:
      body.currency:
        in: [btc, eth, xmr]
    then:
      - gate: "crypto_currency_block"

  - when:
      body.amount:
        lte: 100
    then:
      - downgrade:
          dim: amount
          delta: 6

session_rules:
  # Rapid micro-charges: aggressively escalate risk as charge count accumulates
  # Fires after 2 charges, pushing charges 3-4 into Medium/HITL
  # before the card_testing session block rule fires at 5.
  # Deltas are high to compensate for micro-charge amount downgrade.
  - when:
      record_count:
        gt: 2
    then:
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - upgrade:
          dim: scope
          delta: 24
      - upgrade:
          dim: amount
          delta: 22
      - upgrade:
          dim: sensitivity
          delta: 18
      - upgrade:
          dim: destination
          delta: 13

  # Large daily totals also escalate
  - when:
      daily_total:
        gt: 10000
    then:
      - add_flag:
          flag: GOVERNANCE
          role: primary
      - upgrade:
          dim: scope
          delta: 10
      - upgrade:
          dim: amount
          delta: 8
      - upgrade:
          dim: sensitivity
          delta: 6
