permit0_pack: "permit0/stripe"
action_type: "payments.charge"
base:
  flags:
    financial_write: primary
    external_transfer: secondary
  amplifiers:
    amount: 5
    scope: 3
    reversibility: 4
rules:
  - when:
      body.amount:
        gt: 10000
    then:
      - add_flag:
          flag: high_value
          role: primary
      - upgrade:
          dim: amount
          delta: 3

  - when:
      body.amount:
        gt: 100000
    then:
      - gate: "extremely_high_value_block"

  - when:
      body.currency:
        in: [btc, eth, xmr]
    then:
      - gate: "crypto_currency_block"

  - when:
      body.amount:
        lte: 100
    then:
      - downgrade:
          dim: amount
          delta: 2

session_rules:
  - when:
      daily_total:
        gt: 50000
    then:
      - add_flag:
          flag: velocity_alert
          role: primary
      - upgrade:
          dim: scope
          delta: 2
