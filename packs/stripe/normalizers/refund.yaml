permit0_pack: "permit0/stripe"
id: "stripe:refunds.create"
priority: 99
match:
  all:
    - tool: http
    - method: POST
    - url:
        matches_url:
          host: api.stripe.com
          path: /v1/refunds
normalize:
  action_type: "payments.refund"
  domain: "payments"
  verb: "refund"
  channel: "stripe"
  entities:
    charge:
      from: "body.charge"
      type: "string"
      required: true
    amount:
      from: "body.amount"
      type: "number"
    reason:
      from: "body.reason"
      type: "string"
      default: "requested_by_customer"
