permit0_pack: "permit0/claude_code"
id: "claude_code:write"
priority: 201
match:
  tool: Write
normalize:
  action_type: "files.write"
  domain: "files"
  verb: "write"
  channel: "claude_code"
  entities:
    path:
      from: "file_path"
      type: "string"
      required: true
    file_type:
      compute: "classify_file_type"
      args:
        - "file_path"
    content_length:
      compute: "string_length"
      args:
        - "content"
    path_depth:
      compute: "parse_path_depth"
      args:
        - "file_path"
