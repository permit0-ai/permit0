permit0_pack: "permit0/claude_code"
id: "claude_code:web_fetch"
priority: 207
match:
  tool: WebFetch
normalize:
  action_type: "network.http_get"
  domain: "network"
  verb: "http_get"
  channel: "claude_code"
  entities:
    url:
      from: "url"
      type: "string"
      required: true
    host:
      compute: "url_host"
      args:
        - "url"
    is_private:
      compute: "is_private_ip"
      args:
        - "url"
