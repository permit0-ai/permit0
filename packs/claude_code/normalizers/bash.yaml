permit0_pack: "permit0/claude_code"
id: "claude_code:bash"
priority: 200
match:
  tool: Bash
normalize:
  action_type: "process.shell"
  domain: "process"
  verb: "shell"
  channel: "claude_code"
  entities:
    command:
      from: "command"
      type: "string"
      required: true
    pipe_count:
      compute: "count_pipes"
      args:
        - "command"
