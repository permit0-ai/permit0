permit0_pack: "permit0/claude_code"
id: "claude_code:grep"
priority: 205
match:
  tool: Grep
normalize:
  action_type: "files.read"
  domain: "files"
  verb: "read"
  channel: "claude_code"
  entities:
    pattern:
      from: "pattern"
      type: "string"
      required: true
    path:
      from: "path"
      type: "string"
    output_mode:
      from: "output_mode"
      type: "string"
      default: "files_with_matches"
