permit0_pack: "permit0/claude_code"
action_type: "ai.prompt"
base:
  flags:
    EXECUTION: secondary
  amplifiers:
    scope: 4
    boundary: 3
rules:
  # Very large prompts (>10000 chars) — potential injection payload
  - when:
      prompt_length:
        gt: 10000
    then:
      - upgrade:
          dim: scope
          delta: 4
      - upgrade:
          dim: sensitivity
          delta: 3

session_rules:
  # Many sub-agent delegations in session — potential amplification
  - when:
      record_count:
        gt: 3
    then:
      - upgrade:
          dim: scope
          delta: 6
      - upgrade:
          dim: boundary
          delta: 4
