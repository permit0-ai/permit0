permit0_pack: "permit0/claude_code"
action_type: "files.list"
base:
  flags: {}
  amplifiers:
    scope: 2
    sensitivity: 1
rules:
  # Listing sensitive directories
  - when:
      pattern:
        contains_any: [".env", "secret", "credentials", "private_key", ".ssh"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: secondary
      - upgrade:
          dim: sensitivity
          delta: 6
      - upgrade:
          dim: scope
          delta: 4

  # Broad recursive patterns
  - when:
      pattern:
        contains: "**"
    then:
      - upgrade:
          dim: scope
          delta: 2

session_rules: []
