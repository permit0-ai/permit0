permit0_pack: "permit0/claude_code"
action_type: "network.http_get"
base:
  flags:
    OUTBOUND: secondary
  amplifiers:
    boundary: 4
    scope: 3
    destination: 3
rules:
  # Private IP / localhost access (SSRF)
  - when:
      url:
        contains_any: ["localhost", "127.0.0.1", "::1", "0.0.0.0", "10.", "192.168.", "172.16.", "172.17.", "172.18."]
    then:
      - add_flag:
          flag: PRIVILEGE
          role: primary
      - upgrade:
          dim: boundary
          delta: 8
      - upgrade:
          dim: sensitivity
          delta: 6

  # Known credential exfiltration targets
  - when:
      url:
        contains_any: ["webhook.site", "requestbin", "ngrok", "pipedream"]
    then:
      - add_flag:
          flag: EXPOSURE
          role: primary
      - add_flag:
          flag: OUTBOUND
          role: primary
      - upgrade:
          dim: destination
          delta: 10
      - upgrade:
          dim: boundary
          delta: 8
      - upgrade:
          dim: sensitivity
          delta: 6

session_rules:
  # Multiple network requests in session — potential data exfiltration
  - when:
      record_count:
        gt: 3
    then:
      - add_flag:
          flag: OUTBOUND
          role: primary
      - upgrade:
          dim: boundary
          delta: 4
      - upgrade:
          dim: destination
          delta: 4
