name: claude_code
version: "0.1.0"
permit0_pack: "permit0/claude_code"
vendor: anthropic
description: "Normalizer and risk rules for Claude Code built-in tools (Bash, Write, Edit, Read, Glob, Grep, Agent, WebFetch, WebSearch)"
normalizers:
  - normalizers/bash.yaml
  - normalizers/write.yaml
  - normalizers/edit.yaml
  - normalizers/read.yaml
  - normalizers/glob.yaml
  - normalizers/grep.yaml
  - normalizers/agent.yaml
  - normalizers/web_fetch.yaml
  - normalizers/web_search.yaml
risk_rules:
  # process.shell risk rules are in bash pack (enhanced with Claude Code patterns)
  # files.read risk rules are in filesystem pack (enhanced with Claude Code patterns)
  - risk_rules/file_write.yaml
  - risk_rules/file_list.yaml
  - risk_rules/ai_prompt.yaml
  - risk_rules/network.yaml
