permit0_profile: v1
id: healthtech
name: Healthcare & Life Sciences
description: >
  HIPAA-aligned defaults. Aggressive on data exposure and
  external communication involving potential PHI.
version: "2025.1"

risk_weight_adjustments:
  EXPOSURE:  1.8
  OUTBOUND:  1.5
  FINANCIAL: 0.9
  PHYSICAL:  1.4

amp_weight_adjustments:
  sensitivity: 1.6
  destination: 1.4
  boundary:    1.3
  amount:      0.6

tier_threshold_shifts:
  MEDIUM: -0.08
  HIGH:   -0.07

additional_block_rules:
  - name: phi_external_send
    condition:
      flags: [OUTBOUND, EXPOSURE]
      amplifiers:
        sensitivity: ">= 0.60"
        destination: ">= 0.50"
    reason: "Potential PHI sent to external destination"

  - name: bulk_patient_export
    condition:
      flags: [EXPOSURE]
      amplifiers:
        volume: ">= 0.80"
        sensitivity: ">= 0.50"
    reason: "Bulk export of sensitive records"

action_type_floors:
  email.send:    MEDIUM
  email.send: HIGH
  file.export:  HIGH
  file.share:   HIGH
  db.export:     HIGH
  db.select:     LOW
